<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SUR01 - 測量案件清冊 (React 範例)</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <script src="/javascripts/vendor.js"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="stylesheet" href="/stylesheets/all.css" />
</head>

<body class="bg-lighter">
  <div class="container py-5">
    <div class="row justify-content-center">
      <main class="col-12 col-lg-10">
        <div id="root"></div>

        <script type="text/babel">
          const { useEffect, useMemo, useState } = React;

          // Helper for calling API endpoints.
          // 請依照實際後端路徑調整 baseUrl、Controller/Action 與參數格式
          const baseUrl = "/api"; // 範例："/api" 或 "https://your.domain/" 

          async function callApi({ controller, action, params }) {
            //新增一個安全的參數處理函式，確保 undefined 或 null 轉為空字串
            function safe(v) {
              return v ?? "";
            }
            // 範例：計算段小段資料中的測量標記數量
            function sumMarkerCount(sectItem) {
              return ["LM_N01", "LM_N02", "LM_N03", "LM_N04"]
                .map((k) => Number(sectItem?.[k] ?? 0))
                .reduce((a, b) => a + b, 0);
            }
            // 範例：從選項陣列中取得 KCDE_1 的對應文字標籤
            function getKcde1Label(options, value) {
              const found = options.find((x) => x.KCDE_2 === value);
              return found?.KCNT ?? "";
            }
            const url = new URL(`${baseUrl}/${controller}/${action}`, window.location.origin);
            if (params) {
              Object.entries(params).forEach(([k, v]) => {
                if (v !== undefined && v !== null && v !== "") {
                  url.searchParams.set(k, v);
                }
              });
            }
            const res = await fetch(url.toString(), {
              method: "GET"
            });
            if (!res.ok) {
              const text = await res.text();
              throw new Error(`API 呼叫失敗: ${res.status} ${res.statusText} ${text}`);
            }
            return res.json();
          }

          function formatMinguoYear(year) {
            // 假設輸入民國年 3 碼，例如 "115"，轉為西元
            const y = parseInt(year, 10);
            if (Number.isNaN(y)) return "";
            return (y + 1911).toString();
          }

          function formatDateToMinguo(dateStr) {
            if (!dateStr) return "";
            const d = new Date(dateStr);
            if (Number.isNaN(d.getTime())) return "";
            const y = d.getFullYear() - 1911;
            const m = String(d.getMonth() + 1).padStart(2, "0");
            const d2 = String(d.getDate()).padStart(2, "0");
            return `${String(y).padStart(3, "0")}${m}${d2}`;
          }

          function Sur01Page() {
            const [year, setYear] = useState(115);
            const [kcde1, setKcde1] = useState("");
            const [kcde2, setKcde2] = useState("");
            const [startDate, setStartDate] = useState("");
            const [endDate, setEndDate] = useState("");
            const [fileFormat, setFileFormat] = useState("Excel");
            const [zi, setZi] = useState("");
            const [hao, setHao] = useState("");

            const [kcde1Options, setKcde1Options] = useState([]);
            const [kcde2Options, setKcde2Options] = useState([]);

            const [loading, setLoading] = useState(false);
            const [error, setError] = useState(null);
            const [result, setResult] = useState(null);

            // 取得「收件字」選單 (Controller=Moiadm, Action=GetByKCDE_1)
            useEffect(() => {
              let cancelled = false;

              async function load() {
                try {
                  setError(null);
                  const data = await callApi({
                    controller: "Moiadm",
                    action: "GetByKCDE_1",
                    params: {
                      kcde_1: "04", // 文件範例中使用 04
                    },
                  });

                  if (cancelled) return;
                  // 假設 API 回傳陣列
                  setKcde1Options(Array.isArray(data?.ResultObject) ? data.ResultObject : []);
                } catch (err) {
                  if (!cancelled) setError(err.message);
                }
              }

              load();

              return () => {
                cancelled = true;
              };
            }, []);

            useEffect(() => {
              let cancelled = false;

              async function loadAreaOptions() {
                try {
                  setError(null);
                  const data = await callApi({
                    controller: "Moiadm",
                    action: "GetByKcde_1",
                    params: {
                      kcde_1: "46",
                    },
                  });

                  console.log("行政區 API 回傳 =", data);

                  if (cancelled) return;
                  setKcde2Options(Array.isArray(data?.ResultObject) ? data.ResultObject : []);
                } catch (err) {
                  if (!cancelled) setError(err.message);
                }
              }

              loadAreaOptions();

              return () => {
                cancelled = true;
              };
            }, []);



            const canQuery = useMemo(() => {
              return !!year && !!kcde1 && !!startDate && !!endDate;
            }, [year, kcde1, startDate, endDate]);

            async function handleQuery(e) {
              e.preventDefault();
              setError(null);
              setResult(null);

              if (!canQuery) {
                setError("請填寫必要欄位（年、收件字、日期範圍）。");
                return;
              }

              setLoading(true);
              try {
                // 1) 呼叫 SUR01 Cmsms 取得回傳資料
                const resp = await callApi({
                  controller: "SUR01",
                  action: "Cmsms",
                  params: {
                    year: year.toString().padStart(3, "0"),
                    kcde_1: kcde1,
                    kcde_2: kcde2,
                    startDate: formatDateToMinguo(startDate),
                    endDate: formatDateToMinguo(endDate),
                  },
                });

                // 2) 取回資料後，可依據 MM08 等欄位進一步查詢段小段資料
                //    這裡用一個簡單範例：若有 mm08，呼叫 Moined 的 SECT_D / SECT_C
                const items = Array.isArray(resp) ? resp : [];
                const withSegments = await Promise.all(
                  items.map(async (item) => {
                    if (!item.MM08) return item;
                    try {
                      const sectData = await callApi({
                        controller: "Moined",
                        action: "SECT_D", // 或者 SECT_C
                        params: {
                          MM08: item.MM08,
                        },
                      });
                      return { ...item, segments: sectData };
                    } catch (innerErr) {
                      return { ...item, segmentsError: innerErr.message };
                    }
                  })
                );

                setResult({ raw: resp, withSegments });

                // 3) 若要輸出 Excel/ODF，可在這裡將 result 轉成檔案（xlsx / ods）並下載。
                //    下方提供一個簡易提示範例：
                if (fileFormat === "Excel") {
                  // TODO: 使用比如 SheetJS (xlsx) 產生 Excel 檔案
                } else {
                  // TODO: 使用適合的函式庫輸出 ods 格式
                }
              } catch (err) {
                setError(err.message);
              } finally {
                setLoading(false);
              }
            }

            return (
              <div className="card shadow-sm">
                <div className="card-header text-center d-flex align-items-center justify-content-center" style={{ backgroundColor: "#999999", color: "#ffffff" }}>
                  <h1 className="h5 mb-0">測量案件清冊</h1>
                </div>
                <div className="card-body">
                  <form onSubmit={handleQuery} className="mb-4">
                    <div className="row g-3">
                      <div className="col-12">
                        <label className="form-label">收件年字號</label>
                        <div className="row g-2 align-items-end">
                          <div className="col-auto" style={{ minWidth: "110px" }}>
                            <input
                              className="form-control"
                              value={year}
                              maxLength={3}
                              placeholder="年"
                              onChange={(e) => {
                                const v = e.target.value.replace(/\D/g, "");
                                setYear(v);
                              }}
                            />
                          </div>
                          <div className="col-auto" style={{ minWidth: "170px" }}>
                            <select
                              className="form-select"
                              value={kcde1}
                              onChange={(e) => setKcde1(e.target.value)}
                            >
                              <option value="">請選擇</option>
                              {kcde1Options.map((opt, index) => (
                                <option
                                  key={`kcde1-${index}-${opt.KCDE_1 ?? ""}-${opt.KCDE_2 ?? ""}`}
                                  value={opt.KCDE_2 ?? ""}
                                >
                                  {`${opt.KCDE_2 ?? ""}-${opt.KCNT ?? ""}`}
                                </option>
                              ))}
                            </select>
                          </div>
                          <div className="col-auto d-flex align-items-center" style={{ height: "38px" }}>字</div>
                          <div className="col-auto" style={{ minWidth: "110px" }}>
                            <input
                              className="form-control"
                              value={hao}
                              placeholder="號"
                              onChange={(e) => setHao(e.target.value.replace(/\D/g, "").slice(0, 6))}
                              onBlur={() => {
                                if (hao) {
                                  setHao(hao.padStart(6, "0"));
                                }
                              }}
                            />
                          </div>
                        </div>
                      </div>

                      <div className="col-md-6 col-lg-4">
                        <label className="form-label">行政區</label>
                        <select
                          className="form-select"
                          value={kcde2}
                          onChange={(e) => setKcde2(e.target.value)}
                          disabled={!kcde2Options?.length}
                        >
                          <option value="">請選擇</option>
                          {kcde2Options.map((opt, index) => (
                            <option
                              key={`kcde2-${opt.KCDE_1 ?? ""}-${opt.KCDE_2 ?? index}`}
                              value={opt.KCDE_2 ?? ""}
                            >
                              {opt.KCNT ?? opt.KRMK ?? opt.KCDE_2 ?? ""}
                            </option>
                          ))}
                        </select>
                      </div>

                      <div className="col-12">
                        <label className="form-label">收件日期起訖</label>
                        <div className="row g-2 align-items-center">
                          <div className="col">
                            <input
                              type="date"
                              className="form-control"
                              value={startDate}
                              onChange={(e) => setStartDate(e.target.value)}
                            />
                          </div>
                          <div className="col-auto text-center">～</div>
                          <div className="col">
                            <input
                              type="date"
                              className="form-control"
                              value={endDate}
                              onChange={(e) => setEndDate(e.target.value)}
                            />
                          </div>
                        </div>
                      </div>

                      <div className="col-md-6 col-lg-4">
                        <label className="form-label d-block">檔案格式</label>
                        <div className="form-check form-check-inline">
                          <input
                            className="form-check-input"
                            type="radio"
                            name="fileFormat"
                            id="formatExcel"
                            value="Excel"
                            checked={fileFormat === "Excel"}
                            onChange={(e) => setFileFormat(e.target.value)}
                          />
                          <label className="form-check-label" htmlFor="formatExcel">
                            Excel
                          </label>
                        </div>
                        <div className="form-check form-check-inline">
                          <input
                            className="form-check-input"
                            type="radio"
                            name="fileFormat"
                            id="formatOdf"
                            value="odf"
                            checked={fileFormat === "odf"}
                            onChange={(e) => setFileFormat(e.target.value)}
                          />
                          <label className="form-check-label" htmlFor="formatOdf">
                            odf
                          </label>
                        </div>
                      </div>

                      <div className="col-12 text-center">
                        <button
                          type="submit"
                          className="btn btn-success px-4"
                          disabled={loading || !canQuery}
                        >
                          {loading ? "列印中..." : "列印"}
                        </button>
                      </div>
                    </div>
                  </form>

                  {error && (
                    <div className="alert alert-danger" role="alert">
                      <strong>發生錯誤：</strong> {error}
                    </div>
                  )}

                  {result && (
                    <div className="card p-4">
                      <h2 className="h5">查詢結果</h2>
                      <pre style={{ whiteSpace: "pre-wrap" }}>
                        {JSON.stringify(result, null, 2)}
                      </pre>
                    </div>
                  )}
                </div>
              </div>
            );
          }

          ReactDOM.createRoot(document.getElementById("root")).render(<Sur01Page />);
        </script>

      </main>
    </div>
  </div>

</body>

</html>
